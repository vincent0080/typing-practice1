<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>國高中打字練習</title>
  <style>
    :root {
      --ink: #4c4d55;
      --muted: #777b84;
      --paper: #fbfaf7;
      --panel: #ffffffd9;
      --rose: #ead0d0;
      --sage: #cdd8cf;
      --sky: #cad8e6;
      --lavender: #d9d2e8;
      --butter: #ece0bc;
      --clay: #d8b7aa;
      --mint: #dce8df;
      --line: #e2ded6;
      --good: #6d9274;
      --bad: #c06d6b;
      --focus: #8fa7bd;
      --shadow: 0 18px 55px rgba(94, 97, 105, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      background:
        radial-gradient(circle at 13% 18%, rgba(234, 208, 208, 0.55) 0 110px, transparent 112px),
        radial-gradient(circle at 88% 12%, rgba(202, 216, 230, 0.55) 0 130px, transparent 132px),
        radial-gradient(circle at 72% 88%, rgba(205, 216, 207, 0.62) 0 150px, transparent 153px),
        linear-gradient(135deg, #fbfaf7 0%, #f3efe9 100%);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      display: grid;
      width: 54px;
      height: 54px;
      place-items: center;
      border-radius: 16px;
      color: #5a6874;
      font-weight: 900;
      font-size: 24px;
      background: linear-gradient(145deg, var(--sky), var(--rose));
      box-shadow: 0 12px 26px rgba(92, 99, 108, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .esc-badge {
      flex: 0 0 auto;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.65);
      color: #6a6f78;
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid rgba(226, 222, 214, 0.92);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .controls {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .group + .group {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .label {
      margin-bottom: 9px;
      color: #5f6470;
      font-weight: 800;
      font-size: 14px;
    }

    .seg {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .seg.quad {
      grid-template-columns: repeat(4, 1fr);
    }

    .seg.triple {
      grid-template-columns: repeat(3, 1fr);
    }

    .seg button,
    .action {
      min-height: 44px;
      border-radius: 8px;
      color: var(--ink);
      background: #f3f0ea;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .seg button:hover,
    .action:hover {
      transform: translateY(-1px);
      box-shadow: 0 9px 18px rgba(92, 99, 108, 0.12);
    }

    .seg button.active[data-language="en"],
    .chip.en {
      background: var(--sky);
    }

    .seg button.active[data-language="zh"],
    .chip.zh {
      background: var(--rose);
    }

    .seg button.active[data-mode="practice"] {
      background: var(--sage);
    }

    .seg button.active[data-mode="speed"] {
      background: var(--butter);
    }

    .seg button.active[data-difficulty="easy"] {
      background: var(--mint);
    }

    .seg button.active[data-difficulty="normal"] {
      background: var(--lavender);
    }

    .seg button.active[data-difficulty="hard"] {
      background: var(--clay);
    }

    .seg button.active[data-difficulty="pro"] {
      background: #bfc6b8;
    }

    .select-row {
      display: grid;
      gap: 8px;
    }

    .lesson-btn {
      min-height: 40px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      color: #5c6169;
      text-align: left;
    }

    .lesson-btn.active {
      border-color: transparent;
      background: var(--lavender);
      color: #4e5360;
      font-weight: 800;
    }

    .alphabet-group.hidden {
      display: none;
    }

    .seg button.active[data-alphabet="lower"] {
      background: var(--sky);
    }

    .seg button.active[data-alphabet="upper"] {
      background: var(--butter);
    }

    .action {
      width: 100%;
      margin-top: 10px;
      background: #839bad;
      color: white;
      font-weight: 900;
      letter-spacing: 0;
    }

    .action.secondary {
      background: #9fa78f;
    }

    .main {
      overflow: hidden;
    }

    .stage-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px 0;
      align-items: flex-start;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      color: #535861;
      font-size: 13px;
      font-weight: 800;
    }

    .timer {
      min-width: 112px;
      padding: 9px 12px;
      border-radius: 8px;
      background: #f2eee7;
      text-align: center;
      font-weight: 900;
      color: #5d636c;
    }

    .text-card {
      margin: 18px 20px 16px;
      padding: 18px;
      border-radius: 8px;
      background: #f7f4ee;
      border: 1px solid var(--line);
      line-height: 1.85;
      font-size: clamp(19px, 2.3vw, 25px);
      word-break: break-word;
      max-height: min(48vh, 430px);
      overflow-y: auto;
      scroll-behavior: smooth;
      scrollbar-color: #c8bfcf #f7f4ee;
      scrollbar-width: thin;
    }

    .text-card::-webkit-scrollbar {
      width: 10px;
    }

    .text-card::-webkit-scrollbar-track {
      background: #f7f4ee;
      border-radius: 999px;
    }

    .text-card::-webkit-scrollbar-thumb {
      background: #c8bfcf;
      border-radius: 999px;
    }

    .char {
      position: relative;
      border-radius: 4px;
      padding: 1px 0;
      white-space: pre-wrap;
    }

    .char.correct {
      color: #53785b;
      background: rgba(205, 216, 207, 0.58);
    }

    .char.wrong {
      color: #9d4441;
      background: rgba(234, 208, 208, 0.88);
    }

    .char.current {
      background: #e5d9bd;
      box-shadow: 0 0 0 2px #d5bf82 inset;
    }

    .hint-panel {
      display: none;
      margin: 0 20px 14px;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
    }

    .hint-panel.show {
      display: block;
    }

    .hint-title {
      margin-bottom: 8px;
      color: #68707a;
      font-size: 13px;
      font-weight: 900;
    }

    .hint-row {
      display: grid;
      grid-template-columns: 56px 1fr 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .hint-char,
    .hint-item {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f7f4ee;
      padding: 10px;
    }

    .hint-char {
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 900;
      color: #5a626b;
    }

    .hint-item span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .hint-item b {
      color: #535861;
      font-size: 20px;
    }

    .typing-area {
      display: grid;
      gap: 12px;
      padding: 0 20px 20px;
    }

    textarea {
      width: 100%;
      min-height: 146px;
      resize: vertical;
      border: 2px solid transparent;
      outline: none;
      border-radius: 8px;
      padding: 15px 16px;
      color: #4c4d55;
      background: #fffdf8;
      box-shadow: inset 0 0 0 1px var(--line);
      line-height: 1.65;
      font-size: 19px;
    }

    textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 4px rgba(143, 167, 189, 0.18);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 0 20px 20px;
    }

    .stat {
      min-height: 86px;
      padding: 13px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
    }

    .stat small {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-weight: 800;
    }

    .stat strong {
      color: #555b64;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1;
    }

    .result {
      display: none;
      margin: 0 20px 20px;
      padding: 17px;
      border-radius: 8px;
      border: 1px solid #dccfc0;
      background: #fff8e9;
    }

    .result.show {
      display: block;
    }

    .result h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
      margin-bottom: 14px;
    }

    .result-item {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
    }

    .result-item span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .result-item b {
      display: block;
      margin-top: 5px;
      font-size: 22px;
      color: #535861;
    }

    .mistakes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .mistake {
      padding: 7px 9px;
      border-radius: 8px;
      color: #87433f;
      background: #f1d6d4;
      font-weight: 800;
    }

    .empty {
      color: var(--good);
      font-weight: 900;
    }

    @media (max-width: 860px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .stats,
      .result-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      .shell {
        width: min(100% - 22px, 1120px);
        padding-top: 16px;
      }

      .stage-head {
        flex-direction: column;
      }

      .stats,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .text-card {
        margin-inline: 12px;
        max-height: 36vh;
      }

      .hint-panel {
        margin-inline: 12px;
      }

      .hint-row {
        grid-template-columns: 1fr;
      }

      .typing-area,
      .stats,
      .stage-head {
        padding-inline: 12px;
      }

      .result {
        margin-inline: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo">Aa</div>
        <div>
          <h1>打字練習小教室</h1>
        </div>
      </div>
      <div class="esc-badge">可按結算鍵，或用 Ctrl + Enter 結算</div>
    </header>

    <section class="layout">
      <aside class="panel controls" aria-label="練習設定">
        <div class="group">
          <div class="label">大分類</div>
          <div class="seg" id="languageButtons">
            <button type="button" class="active" data-language="en">英打</button>
            <button type="button" data-language="zh">中打</button>
          </div>
        </div>

        <div class="group">
          <div class="label">模式</div>
          <div class="seg" id="modeButtons">
            <button type="button" class="active" data-mode="practice">練習</button>
            <button type="button" data-mode="speed">測速</button>
          </div>
        </div>

        <div class="group">
          <div class="label">難度</div>
          <div class="seg quad" id="difficultyButtons">
            <button type="button" class="active" data-difficulty="easy">簡單</button>
            <button type="button" data-difficulty="normal">普通</button>
            <button type="button" data-difficulty="hard">困難</button>
            <button type="button" data-difficulty="pro">專業</button>
          </div>
        </div>

        <div class="group alphabet-group" id="alphabetGroup">
          <div class="label">A-Z 練習</div>
          <div class="seg" id="alphabetButtons">
            <button type="button" data-alphabet="lower">小寫</button>
            <button type="button" data-alphabet="upper">大寫</button>
          </div>
        </div>

        <div class="group">
          <div class="label">文章</div>
          <div class="select-row" id="lessonButtons"></div>
        </div>

        <div class="group">
          <button type="button" class="action" id="finishBtn">結算目前結果</button>
          <button type="button" class="action" id="startBtn">清空重打</button>
          <button type="button" class="action secondary" id="resetBtn">換一輪</button>
        </div>
      </aside>

      <section class="panel main" aria-label="打字區">
        <div class="stage-head">
          <div class="chip-row">
            <span class="chip en" id="languageChip">英打</span>
            <span class="chip" id="modeChip">練習</span>
            <span class="chip" id="difficultyChip">簡單</span>
            <span class="chip" id="lessonChip">校園目標</span>
          </div>
          <div class="timer" id="timer">00:00</div>
        </div>

        <div class="text-card" id="targetText"></div>

        <div class="hint-panel" id="zhHintPanel" aria-live="polite">
          <div class="hint-title">下一個中文字提示</div>
          <div class="hint-row">
            <div class="hint-char" id="hintChar">字</div>
            <div class="hint-item"><span>注音 / 拼音</span><b id="hintPhonetic">-</b></div>
            <div class="hint-item"><span>嘸蝦米拆碼</span><b id="hintBoshiamy">-</b></div>
          </div>
        </div>

        <div class="typing-area">
          <textarea id="typingInput" placeholder="直接在這裡輸入第一個字，計時會自動開始。"></textarea>
        </div>

        <div class="stats" id="liveStats"></div>

        <section class="result" id="resultBox" aria-live="polite"></section>
      </section>
    </section>
  </main>

  <script>
    const lessons = {
      en: {
            easy: [
                  {
                        title: "Campus Goals",
                        text: "Every semester gives students a clean place to begin again. A small goal, such as arriving early, asking one clear question, or reviewing notes before sleep, can turn into a steady habit. Learning feels easier when students give themselves time to practice and notice small progress."
                  },
                  {
                        title: "Library Time",
                        text: "A quiet library can help students slow down and focus. Before opening a book, it is useful to choose one purpose for reading. Some students look for facts, some compare opinions, and some simply enjoy a story. Good reading begins with attention."
                  },
                  {
                        title: "Healthy Routine",
                        text: "A healthy routine supports both study and daily life. Drinking water, sleeping enough, moving the body, and taking short breaks can help the mind stay fresh. Students do not need a perfect schedule. They need a routine they can repeat."
                  },
                  {
                        title: "Class Discussion",
                        text: "In class discussion, listening is as important as speaking. A useful answer does not need to be long. It should connect to the topic and show respect for other ideas. When students listen first, their own opinions become clearer."
                  },
                  {
                        title: "Online Safety",
                        text: "The internet is useful, but students should protect personal information. A strong password, careful sharing, and patient checking can prevent many problems. Before clicking a link, it is wise to pause and think about where it came from."
                  },
                  {
                        title: "Team Practice",
                        text: "A strong team grows through practice and trust. Each member may have a different role, but everyone needs to understand the goal. When a mistake happens, a good team learns from it instead of blaming one person."
                  },
                  {
                        title: "Weekend Plan",
                        text: "A good weekend plan leaves time for homework, rest, family, and friends. Students can start with the most important task, finish it first, and then enjoy free time with less pressure. Planning creates more freedom."
                  },
                  {
                        title: "Music Break",
                        text: "Music can help some students relax after a long day. A short break with a favorite song may make study time feel lighter. The key is to return to the task before the break becomes too long."
                  },
                  {
                        title: "New Club",
                        text: "Joining a new club can feel nervous at first. Students may meet new people, try new skills, and learn how to work with others. Even if the first meeting feels strange, experience grows through showing up again."
                  },
                  {
                        title: "Daily Review",
                        text: "Daily review does not need to take a long time. Five or ten minutes can help students remember the main points from class. Writing one question and one idea after each lesson is a simple way to build memory."
                  }
            ],
            normal: [
                  {
                        title: "Time Management",
                        text: "High school and college both require students to manage subjects, activities, and relationships at the same time. A useful plan begins with choosing priorities, not filling every hour. When students divide large tasks into smaller steps, deadlines become less frightening. Good time management also includes rest, because a tired mind often needs more time to do simple work."
                  },
                  {
                        title: "Reading Strategy",
                        text: "Reading well means more than moving the eyes across a page. Students can preview the title, notice headings, mark unfamiliar words, and write short notes in the margin. These actions help the reader build a map of the text. When the article becomes difficult, the notes provide a path back to the main idea."
                  },
                  {
                        title: "Presentation Skills",
                        text: "A clear presentation depends on preparation and audience awareness. Students should not place every sentence on a slide. Instead, they can choose key words, useful examples, and one simple chart when needed. Speaking slowly and making eye contact helps listeners follow the message. Practice turns nervous energy into a steady rhythm."
                  },
                  {
                        title: "Digital Notes",
                        text: "Digital notes are helpful when they are organized with purpose. A folder, file name, and short summary can save time later. Students should also review their notes instead of only collecting them. Information becomes knowledge when the learner compares ideas, asks questions, and connects new material with previous lessons."
                  },
                  {
                        title: "Group Project",
                        text: "A group project works best when members discuss expectations early. Clear roles reduce confusion, but everyone should still understand the whole topic. If one person has difficulty, the team can adjust the plan before the deadline. Respectful communication often matters more than perfect talent, because projects change as they develop."
                  },
                  {
                        title: "Media Judgment",
                        text: "Modern students meet news, comments, and advertisements every day. A dramatic headline may attract attention, but careful readers ask who wrote it and what evidence supports it. Checking dates, sources, and missing context can prevent misunderstanding. Media judgment is a daily skill, not only a school assignment."
                  },
                  {
                        title: "Study Environment",
                        text: "The place where students study can shape their attention. A clean desk, enough light, and fewer notifications make it easier to begin. Some people need silence, while others work better with soft background sound. The best environment is the one that helps the learner return to the task quickly."
                  },
                  {
                        title: "Learning Feedback",
                        text: "Feedback is useful when students treat it as information instead of judgment. A teacher may point out unclear logic, missing evidence, or careless formatting. These comments can feel uncomfortable, but they show where improvement is possible. Students who revise patiently usually learn more than students who only look at the score."
                  },
                  {
                        title: "Volunteer Service",
                        text: "Volunteer service gives students a chance to understand communities beyond the classroom. They may help children read, support an event, or clean a public space. The value is not only the number of hours. Reflection helps students see how responsibility, empathy, and cooperation grow through action."
                  },
                  {
                        title: "Exam Preparation",
                        text: "Preparing for an exam is easier when students begin before the last night. A review plan can include practice questions, summaries, and short self-tests. Mistakes should be sorted by cause, such as careless reading, weak concepts, or time pressure. This method turns anxiety into useful information."
                  }
            ],
            hard: [
                  {
                        title: "Learning Independence",
                        text: "Independent learning does not mean studying alone without help. It means knowing when to search, when to ask, when to test an idea, and when to revise a method. Students who become independent learners often keep records of questions and mistakes. They learn to notice patterns in their own behavior, such as avoiding difficult chapters or spending too much time on easy tasks. This awareness makes future learning more flexible and honest."
                  },
                  {
                        title: "Critical Thinking",
                        text: "Critical thinking begins with curiosity and doubt. A student should not reject every claim, but should ask what evidence supports it, what assumptions are hidden, and what alternative explanation might exist. In discussions, critical thinking also requires patience, because people may use the same words with different meanings. Careful thinkers define terms, compare examples, and change their views when stronger evidence appears."
                  },
                  {
                        title: "Research Habits",
                        text: "Good research habits develop slowly. Students begin with a question, but the question may change as they read more sources. A useful researcher records search terms, saves publication details, and writes brief summaries before copying quotations. This process prevents confusion later and helps the student understand the conversation around a topic. Research is not a hunt for one perfect answer; it is a disciplined way to build a better question."
                  },
                  {
                        title: "Public Issues",
                        text: "Public issues such as housing, transportation, and environmental policy often involve competing values. A simple answer may sound attractive, but real decisions affect different groups in different ways. Students can practice analyzing these issues by identifying stakeholders, costs, benefits, and long-term effects. This kind of thinking prepares them to participate responsibly in civic life instead of reacting only to emotion."
                  },
                  {
                        title: "Technology Ethics",
                        text: "Technology changes quickly, but ethical questions remain important. A new tool may save time, collect data, or influence behavior in ways users do not fully notice. Students should ask who benefits, who carries the risk, and whether people can make informed choices. Ethical technology use requires more than following rules. It asks learners to connect convenience with responsibility."
                  },
                  {
                        title: "Cross Cultural Communication",
                        text: "Cross cultural communication requires attention to language, context, and unspoken expectations. A phrase that sounds direct in one community may feel rude in another. Students who work with international classmates should avoid quick assumptions and ask respectful questions. When people explain their habits and listen carefully, differences become a source of learning rather than a cause of distance."
                  },
                  {
                        title: "Data Interpretation",
                        text: "Data can support a strong argument, but numbers do not speak for themselves. Students must ask how the data was collected, what was excluded, and whether the graph design changes the reader’s impression. Averages may hide important differences between groups. Responsible interpretation means explaining both the pattern and the limits of what the data can prove."
                  },
                  {
                        title: "Academic Writing",
                        text: "Academic writing is not only a formal style. It is a way of guiding readers through a problem, evidence, and conclusion. A strong paragraph usually begins with a clear point, follows with support, and explains why the evidence matters. Students improve when they revise structure before correcting small grammar mistakes, because clear thinking creates clear sentences."
                  },
                  {
                        title: "Community Design",
                        text: "Designing a better community requires listening before planning. Students may imagine a park, website, club, or public service, but the people who use it understand daily problems best. Interviews and observation can reveal needs that are not obvious at first. Good design balances creativity with evidence, and it keeps changing after real users respond."
                  },

    function currentLesson() {
      if (state.language === "en" && state.alphabetMode) return alphabetLessons[state.alphabetMode];
      return lessons[state.language][state.difficulty][state.lessonIndex];
    }

    function finishReason() {
      return state.mode === "speed" ? "完成測速" : "完成練習";
    }

    function difficultyLabel() {
      return {
        easy: "簡單",
        normal: "普通",
        hard: "困難",
        pro: "專業"
      }[state.difficulty];
    }

    function difficultyColor() {
      return {
        easy: "var(--mint)",
        normal: "var(--lavender)",
        hard: "var(--clay)",
        pro: "#bfc6b8"
      }[state.difficulty];
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatTime(ms) {
      const seconds = Math.floor(ms / 1000);
      return `${pad(Math.floor(seconds / 60))}:${pad(seconds % 60)}`;
    }

    function escapeHtml(char) {
      return char
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function effectiveInputValue() {
      return state.composing ? state.compositionBaseValue : typingInput.value;
    }

    function isLessonComplete() {
      return effectiveInputValue().length >= currentLesson().text.length;
    }

    function currentTargetChar() {
      return currentLesson().text[effectiveInputValue().length] || "";
    }

    function isChineseChar(char) {
      return /[\u3400-\u9fff]/.test(char);
    }

    function renderZhHint() {
      if (state.language !== "zh" || state.finished) {
        zhHintPanel.classList.remove("show");
        return;
      }

      const char = currentTargetChar();
      if (!char) {
        zhHintPanel.classList.remove("show");
        return;
      }

      zhHintPanel.classList.add("show");
      hintChar.textContent = char === " " ? "空格" : char;

      if (!isChineseChar(char)) {
        hintPhonetic.textContent = "標點 / 空格";
        hintBoshiamy.textContent = "不用拆碼";
        return;
      }

      const hint = zhInputHints[char];
      const boshiamyCodes = verifiedBoshiamyCodes[char];
      hintPhonetic.textContent = hint ? hint.phonetic : "尚未建立";
      hintBoshiamy.textContent = boshiamyCodes ? boshiamyCodes.join(" / ") : "待查碼";
    }

    function renderLessons() {
      lessonButtons.innerHTML = lessons[state.language][state.difficulty].map((lesson, index) => (
        `<button type="button" class="lesson-btn ${index === state.lessonIndex ? "active" : ""}" data-lesson="${index}">${lesson.title}</button>`
      )).join("");
    }

    function renderAlphabetControls() {
      alphabetGroup.classList.toggle("hidden", state.language !== "en");
      document.querySelectorAll("[data-alphabet]").forEach(btn => {
        btn.classList.toggle("active", state.alphabetMode === btn.dataset.alphabet);
      });
    }

    function getMistakes(input, text) {
      const mistakeMap = new Map();
      const max = Math.max(input.length, text.length);
      for (let i = 0; i < max; i += 1) {
        const expected = text[i] || "未輸入";
        const typed = input[i] || "空白";
        if (input[i] !== undefined && input[i] !== text[i]) {
          const label = expected === " " ? "空格" : expected;
          const key = `${label}→${typed === " " ? "空格" : typed}`;
          mistakeMap.set(key, (mistakeMap.get(key) || 0) + 1);
        }
      }
      return [...mistakeMap.entries()].map(([label, count]) => ({ label, count }));
    }

    function getMetrics(input, ms) {
      const text = currentLesson().text;
      let correct = 0;
      const comparable = input.length;
      for (let i = 0; i < input.length; i += 1) {
        if (input[i] === text[i]) correct += 1;
      }
      const minutes = Math.max(ms / 60000, 1 / 60);
      const typedLetters = input.replace(/\s/g, "").length;
      const typedWords = input.trim() ? input.trim().split(/\s+/).length : 0;
      const typedChars = input.replace(/\s/g, "").length;
      const accuracy = comparable ? Math.round((correct / comparable) * 100) : 0;
      return {
        correct,
        total: text.length,
        accuracy,
        lettersPerMinute: Math.round(typedLetters / minutes),
        wordsPerMinute: Math.round(typedWords / minutes),
        charsPerMinute: Math.round(typedChars / minutes),
        progress: Math.min(100, Math.round((input.length / text.length) * 100)),
        mistakes: getMistakes(input, text)
      };
    }

    function renderTarget() {
      const text = currentLesson().text;
      const input = effectiveInputValue();
      targetText.innerHTML = [...text].map((char, index) => {
        let className = "char";
        if (index < input.length) className += input[index] === char ? " correct" : " wrong";
        if (index === input.length && !state.finished) className += " current";
        return `<span class="${className}">${char === " " ? " " : escapeHtml(char)}</span>`;
      }).join("");
      keepCurrentCharVisible();
    }

    function keepCurrentCharVisible() {
      const current = targetText.querySelector(".char.current");
      if (!current) return;

      const cardRect = targetText.getBoundingClientRect();
      const currentRect = current.getBoundingClientRect();
      const safeTop = cardRect.top + targetText.clientHeight * 0.28;
      const safeBottom = cardRect.top + targetText.clientHeight * 0.72;

      if (currentRect.top < safeTop || currentRect.bottom > safeBottom) {
        const targetScroll = targetText.scrollTop + currentRect.top - cardRect.top - targetText.clientHeight * 0.38;
        targetText.scrollTo({
          top: Math.max(0, targetScroll),
          behavior: "smooth"
        });
      }
    }

    function renderStats() {
      const metrics = getMetrics(effectiveInputValue(), state.elapsedMs);
      const baseStats = [
        ["進度", `${metrics.progress}%`],
        ["正確率", `${metrics.accuracy}%`],
        ["正確字數", `${metrics.correct}/${metrics.total}`]
      ];

      if (state.language === "en") {
        baseStats.push(["每分鐘", `${metrics.lettersPerMinute} 字母`], ["每分鐘", `${metrics.wordsPerMinute} 詞`]);
      } else {
        baseStats.push(["每分鐘", `${metrics.charsPerMinute} 字`]);
      }

      liveStats.innerHTML = baseStats.map(([label, value]) => (
        `<div class="stat"><small>${label}</small><strong>${value}</strong></div>`
      )).join("");
    }

    function renderHeader() {
      languageChip.textContent = state.language === "en" ? "英打" : "中打";
      languageChip.className = `chip ${state.language}`;
      modeChip.textContent = state.mode === "practice" ? "練習" : "測速";
      modeChip.style.background = state.mode === "practice" ? "var(--sage)" : "var(--butter)";
      difficultyChip.textContent = difficultyLabel();
      difficultyChip.style.background = difficultyColor();
      lessonChip.textContent = currentLesson().title;
      timer.textContent = formatTime(state.elapsedMs);
    }

    function tick() {
      if (!state.started || state.finished) return;
      state.elapsedMs = Date.now() - state.startTime;
      timer.textContent = formatTime(state.elapsedMs);
      renderStats();
    }

    function startTimer() {
      state.started = true;
      state.finished = false;
      state.startTime = Date.now() - state.elapsedMs;
      clearInterval(state.timerId);
      state.timerId = setInterval(tick, 300);
    }

    function resetSession(keepText = false) {
      clearInterval(state.timerId);
      state.started = false;
      state.finished = false;
      state.elapsedMs = 0;
      state.composing = false;
      state.compositionBaseValue = "";
      if (!keepText) typingInput.value = "";
      resultBox.classList.remove("show");
      resultBox.innerHTML = "";
      renderAll();
    }

    function finishSession(reason = "完成結算") {
      if (state.finished) return;
      state.finished = true;
      state.started = false;
      state.elapsedMs = state.startTime ? Date.now() - state.startTime : state.elapsedMs;
      clearInterval(state.timerId);
      typingInput.blur();
      renderAll();
      showResult(reason);
    }

    function handleEscFinish(event) {
      const isEsc = event.key === "Escape" || event.key === "Esc" || event.code === "Escape" || event.keyCode === 27;
      const isBackupFinish = (event.ctrlKey || event.metaKey) && event.key === "Enter";
      if ((!isEsc && !isBackupFinish) || state.finished) return;
      event.preventDefault();
      event.stopPropagation();
      if (event.stopImmediatePropagation) event.stopImmediatePropagation();
      finishSession(isEsc ? "ESC 結算結果" : "快捷鍵結算結果");
    }

    function showResult(reason) {
      const metrics = getMetrics(effectiveInputValue(), state.elapsedMs);
      const speedItems = state.language === "en"
        ? [
          ["每分鐘字母", metrics.lettersPerMinute],
          ["每分鐘詞", metrics.wordsPerMinute]
        ]
        : [["每分鐘字", metrics.charsPerMinute]];

      const mistakesHtml = metrics.mistakes.length
        ? `<div class="mistakes">${metrics.mistakes.map(item => `<span class="mistake">${escapeHtml(item.label)} × ${item.count}</span>`).join("")}</div>`
        : `<p class="empty">全部都打對了，很漂亮！</p>`;

      resultBox.innerHTML = `
        <h2>${reason}</h2>
        <div class="result-grid">
          <div class="result-item"><span>時間</span><b>${formatTime(state.elapsedMs)}</b></div>
          <div class="result-item"><span>正確率</span><b>${metrics.accuracy}%</b></div>
          ${speedItems.map(([label, value]) => `<div class="result-item"><span>${label}</span><b>${value}</b></div>`).join("")}
        </div>
        <strong>打錯的字</strong>
        ${mistakesHtml}
      `;
      resultBox.classList.add("show");
    }

    function renderAll() {
      renderLessons();
      renderAlphabetControls();
      renderHeader();
      renderTarget();
      renderZhHint();
      renderStats();
    }

    languageButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-language]");
      if (!button) return;
      state.language = button.dataset.language;
      state.alphabetMode = null;
      state.lessonIndex = 0;
      document.querySelectorAll("[data-language]").forEach(btn => btn.classList.toggle("active", btn === button));
      resetSession();
    });

    modeButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-mode]");
      if (!button) return;
      state.mode = button.dataset.mode;
      document.querySelectorAll("[data-mode]").forEach(btn => btn.classList.toggle("active", btn === button));
      resetSession();
    });

    difficultyButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-difficulty]");
      if (!button) return;
      state.difficulty = button.dataset.difficulty;
      state.alphabetMode = null;
      state.lessonIndex = 0;
      document.querySelectorAll("[data-difficulty]").forEach(btn => btn.classList.toggle("active", btn === button));
      resetSession();
    });

    alphabetButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-alphabet]");
      if (!button) return;
      state.language = "en";
      state.alphabetMode = button.dataset.alphabet;
      document.querySelectorAll("[data-language]").forEach(btn => btn.classList.toggle("active", btn.dataset.language === "en"));
      resetSession();
      typingInput.focus();
    });

    lessonButtons.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-lesson]");
      if (!button) return;
      state.alphabetMode = null;
      state.lessonIndex = Number(button.dataset.lesson);
      resetSession();
    });

    startBtn.addEventListener("click", () => {
      resetSession();
      typingInput.focus();
    });

    finishBtn.addEventListener("click", () => {
      finishSession("手動結算結果");
    });

    resetBtn.addEventListener("click", () => {
      if (state.alphabetMode) {
        const modes = Object.keys(alphabetLessons);
        state.alphabetMode = modes[(modes.indexOf(state.alphabetMode) + 1) % modes.length];
        resetSession();
        typingInput.focus();
        return;
      }
      state.lessonIndex = (state.lessonIndex + 1) % lessons[state.language][state.difficulty].length;
      resetSession();
      typingInput.focus();
    });

    typingInput.addEventListener("compositionstart", () => {
      state.composing = true;
      state.compositionBaseValue = typingInput.value;
      renderTarget();
      renderZhHint();
      renderStats();
    });

    typingInput.addEventListener("compositionend", () => {
      state.composing = false;
      state.compositionBaseValue = "";
      if (!state.started && !state.finished && typingInput.value.length > 0) startTimer();
      renderTarget();
      renderZhHint();
      renderStats();
      if (isLessonComplete()) {
        finishSession(finishReason());
      }
    });

    typingInput.addEventListener("input", () => {
      if (!state.composing && !state.started && !state.finished && typingInput.value.length > 0) startTimer();
      renderTarget();
      renderZhHint();
      renderStats();
      if (!state.composing && isLessonComplete()) {
        finishSession(finishReason());
      }
    });

    typingInput.addEventListener("keydown", handleEscFinish);
    typingInput.addEventListener("keyup", handleEscFinish);
    document.addEventListener("keydown", handleEscFinish, true);
    document.addEventListener("keyup", handleEscFinish, true);
    window.addEventListener("keydown", handleEscFinish, true);
    window.addEventListener("keyup", handleEscFinish, true);

    renderAll();
  </script>
</body>
</html>
